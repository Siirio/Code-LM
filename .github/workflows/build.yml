name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'     # triggers on v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # manual trigger for testing

jobs:
  build-frontend:
    name: Build React frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install & build
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Upload built frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: backend/static/
          retention-days: 1

  build-backend:
    name: Build Python backend (${{ matrix.os }})
    needs: build-frontend
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Download built frontend (needed by PyInstaller spec)
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: backend/static/

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt pyinstaller

      - name: Download and convert embedding model to ONNX
        working-directory: backend
        run: |
          pip install "optimum[onnxruntime]" sentence-transformers
          python scripts/setup_embedding_model.py

      - name: Build PyInstaller binary
        working-directory: backend
        run: pyinstaller backend.spec

      - name: Upload backend binary
        uses: actions/upload-artifact@v4
        with:
          name: backend-bin-${{ matrix.os }}
          path: backend/dist/codelm-backend/
          retention-days: 1

  build-electron:
    name: Build Electron (${{ matrix.os }})
    needs: [build-frontend, build-backend]
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download built frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: backend/static/

      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: backend-bin-${{ matrix.os }}
          path: backend/dist/codelm-backend/

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Build Electron app
        working-directory: electron
        run: npm run build:${{ matrix.platform }} -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # skip macOS code signing in CI

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codelm-${{ matrix.os }}
          if-no-files-found: ignore
          retention-days: 1
          path: |
            electron/dist/*.exe
            electron/dist/*.dmg
            electron/dist/*.AppImage

  release:
    name: Publish GitHub Release
    needs: build-electron
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download electron artifacts (Windows)
        uses: actions/download-artifact@v4
        with:
          name: codelm-windows-latest
          path: dist/

      - name: Download electron artifacts (macOS)
        uses: actions/download-artifact@v4
        with:
          name: codelm-macos-latest
          path: dist/

      - name: Download electron artifacts (Linux)
        uses: actions/download-artifact@v4
        with:
          name: codelm-ubuntu-latest
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.exe
            dist/**/*.dmg
            dist/**/*.AppImage
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
