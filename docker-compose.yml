services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: engramai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: engramai
      POSTGRES_USER: engramai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-engramai}
    ports:
      - "54320:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.20-community
    container_name: engramai_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-engramai}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "54322:7474"   # Neo4j browser UI
      - "54321:7687"   # Bolt protocol (used by the backend)
    volumes:
      - neo4j_data:/data

  qdrant:
    image: qdrant/qdrant:v1.13.3
    container_name: engramai_qdrant
    restart: unless-stopped
    ports:
      - "54323:6333"   # REST + gRPC
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
